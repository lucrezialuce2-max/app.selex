<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verona Smart Food App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel per JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Ottimizzazione per mobile */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ICON_MAP = {
            'map-pin': 'MapPin',
            'coins': 'Coins',
            'check-circle': 'CheckCircle',
            'x': 'X',
            'chevron-left': 'ChevronLeft',
            'chevron-right': 'ChevronRight',
            'minus': 'Minus',
            'plus': 'Plus',
            'shopping-basket': 'ShoppingBasket',
            'map': 'Map',
            'camera': 'Camera',
            'ticket': 'Ticket',
            'user': 'User',
            'menu': 'Menu'
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconName = ICON_MAP[name];
            const iconData = iconName ? lucide.icons?.[iconName] : null;

            if (!iconData) {
                return <span aria-hidden="true" className={className} style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.85, lineHeight: 1 }}>•</span>;
            }

            return (
                <svg
                    aria-hidden="true"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2.25"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {iconData.map(([tagName, attrs], index) => React.createElement(tagName, { key: index, ...attrs }))}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [orderMode, setOrderMode] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [points, setPoints] = useState(1250);
            const [savedEuro, setSavedEuro] = useState(42.50);
            const [bookingQuantity, setBookingQuantity] = useState(250);
            const [showSuccessToast, setShowSuccessToast] = useState(false);
            const [toastMessage, setToastMessage] = useState('Budget Salvato! +3.50€ In Tasca');
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [recipeProofMode, setRecipeProofMode] = useState(false);
            const [proofPhotoName, setProofPhotoName] = useState('');

            const navigateTo = (tab) => {
                setActiveTab(tab);
                setOrderMode(false);
                setSelectedRecipe(null);
                setSelectedCategory(null);
                setRecipeProofMode(false);
                setProofPhotoName('');
            };

            const LOGO_URL = "https://static.famila.it/dam/jcr:55a632ff-4a58-43ff-a3ff-c9ebdde5348e/Insegna=Famila,%20Device=desktop.svg";

            const categories = [
                { id: 'gastronomia', name: 'Gastronomia', icon: '🍲', lucide: 'utensils', desc: 'Eccedenze del giorno' },
                { id: 'panetteria', name: 'Panetteria', icon: '🥖', lucide: 'croissant', desc: 'Salva il pane fresco' },
                { id: 'macelleria', name: 'Macelleria', icon: '🥩', lucide: 'beef', desc: 'Tagli calibrati' },
                { id: 'ortofrutta', name: 'Ortofrutta', icon: '🍎', lucide: 'apple', desc: 'Box anti-spreco' },
            ];

            const recipesData = [
                {
                    id: 1,
                    title: 'Sformato di polenta croccante',
                    img: '🍽️',
                    imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/3/34/Polenta_con_funghi.jpg',
                    difficulty: 'Media',
                    time: '60 min',
                    saveValue: '3.50€',
                    ingredients: ['300g Polenta avanzata', '80g Formaggio', 'Pangrattato Selex']
                },
                {
                    id: 2,
                    title: 'Rose di patate e pancetta',
                    img: '🥔',
                    imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/0/02/Patate_al_forno.jpg',
                    difficulty: 'Facile',
                    time: '45 min',
                    saveValue: '2.80€',
                    ingredients: ['3 Patate', '100g Pancetta Famila', 'Rosmarino']
                },
                {
                    id: 3,
                    title: 'Frittata di pane e erbe',
                    img: '🍞',
                    imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/4/4f/Frittata_di_pane.jpg',
                    difficulty: 'Facile',
                    time: '25 min',
                    saveValue: '1.90€',
                    ingredients: ['Pane raffermo', 'Uova', 'Prezzemolo']
                },
                {
                    id: 4,
                    title: 'Insalata di frutta recuperata',
                    img: '🍎',
                    imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/9/9c/Fruit_salad.jpg',
                    difficulty: 'Facile',
                    time: '15 min',
                    saveValue: '1.20€',
                    ingredients: ['Frutta matura', 'Yogurt', 'Menta']
                }
            ];

            const mapLocations = [
                { id: 1, name: 'Famila Superstore Verona', area: 'Veronetta', status: 'Ritiro smart attivo', color: 'bg-[#E30613]', pos: 'top-1/3 left-1/3' },
                { id: 2, name: 'Osteria Centro Storico', area: 'Arena', status: 'Doggy bag disponibile', color: 'bg-[#004C97]', pos: 'bottom-1/4 right-1/3' },
                { id: 3, name: 'Pizzeria Porta Nuova', area: 'Porta Nuova', status: 'Partner anti-spreco', color: 'bg-[#006D41]', pos: 'top-[54%] left-[62%]' }
            ];

            const handleConfirmOrder = () => {
                setPoints(prev => prev + 50);
                setSavedEuro(prev => prev + 3.50);
                setToastMessage('Budget Salvato! +3.50€ In Tasca');
                setShowSuccessToast(true);
                setTimeout(() => { setShowSuccessToast(false); setOrderMode(false); }, 2000);
            };

            const parseEuroValue = (value) => {
                if (!value) return 0;
                const numeric = Number(String(value).replace(',', '.').replace(/[^\d.]/g, ''));
                return Number.isFinite(numeric) ? numeric : 0;
            };

            const handleRecipeCertification = () => {
                const recipeValue = parseEuroValue(selectedRecipe?.saveValue);
                if (!proofPhotoName || recipeValue <= 0) return;

                setSavedEuro(prev => prev + recipeValue);
                setToastMessage(`Ricetta certificata! +${recipeValue.toFixed(2)}€ In Tasca`);
                setShowSuccessToast(true);

                setTimeout(() => {
                    setShowSuccessToast(false);
                    setRecipeProofMode(false);
                    setSelectedRecipe(null);
                    setProofPhotoName('');
                }, 2200);
            };

            const Header = () => (
                <div className="bg-white border-b border-gray-100 sticky top-0 z-50">
                    <div className="bg-[#004C97] py-2 px-6 flex items-center justify-between text-[9px] text-white font-black tracking-widest uppercase">
                        <div className="flex items-center gap-2">
                            <Icon name="map-pin" size={10} />
                            <span>Verona Smart City • Veronetta</span>
                        </div>
                        <span>Comune di Verona</span>
                    </div>
                    <div className="px-6 py-5 flex justify-between items-center bg-white rounded-b-[2.5rem]">
                        <div className="flex flex-col cursor-pointer" onClick={() => {setActiveTab('home'); setOrderMode(false); setSelectedRecipe(null);}}>
                            <img src={LOGO_URL} alt="Logo Famila" className="h-8 w-auto object-contain self-start" />
                            <span className="text-[9px] font-black text-[#004C97] uppercase tracking-tighter mt-1 italic">Ancora un morso, Verona.</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="bg-[#F9F4EF] px-3 py-1.5 rounded-full border border-orange-100 flex items-center gap-2 shadow-sm">
                                <Icon name="coins" size={14} className="text-[#E30613]" />
                                <span className="text-xs font-black text-[#006D41] italic">{savedEuro.toFixed(2)}€</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen bg-white font-sans flex flex-col overflow-hidden shadow-2xl relative border-x border-gray-200">
                    <Header />
                    
                    {showSuccessToast && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-[#006D41] text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 animate-in">
                            <Icon name="check-circle" size={20} />
                            <span className="font-black text-[10px] uppercase tracking-widest italic tracking-tighter">{toastMessage}</span>
                        </div>
                    )}

                    {/* Contenuto Principale */}
                    <div className="flex-1 overflow-y-auto no-scrollbar bg-white">
                        {orderMode ? (
                            <div className="p-6 animate-in">
                                <button onClick={() => setOrderMode(false)} className="mb-6 flex items-center text-[#004C97] font-black text-xs uppercase tracking-widest">
                                    <Icon name="chevron-left" size={16} className="mr-1" /> Indietro
                                </button>

                                <div className="bg-[#081018] rounded-[3.5rem] p-4 shadow-2xl border border-white/10">
                                    <div className="flex items-center justify-between px-4 pt-2 pb-4 text-white/90">
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-white/45">Fotocamera</p>
                                            <h1 className="text-xl font-black uppercase tracking-tighter">Inquadra il prodotto</h1>
                                        </div>
                                        <div className="bg-white/10 backdrop-blur-xl px-3 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest">
                                            Rilevamento attivo
                                        </div>
                                    </div>

                                    <div className="relative h-[420px] rounded-[2.6rem] overflow-hidden border border-white/10 shadow-inner">
                                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_25%_20%,rgba(255,255,255,0.30)_0,transparent_24%),radial-gradient(circle_at_75%_75%,rgba(227,6,19,0.28)_0,transparent_22%),linear-gradient(160deg,rgba(0,76,151,0.35),rgba(8,16,24,0.95))]" />
                                        <div className="absolute inset-0 opacity-70 blur-[2px] bg-[linear-gradient(115deg,rgba(255,255,255,0.24)_0%,rgba(255,255,255,0.06)_35%,rgba(255,255,255,0.0)_55%),radial-gradient(circle_at_center,rgba(255,255,255,0.12)_0,transparent_38%)]" />
                                        <div className="absolute inset-0 bg-[url('https://upload.wikimedia.org/wikipedia/commons/5/5e/Slice_of_pizza_with_melted_cheese.jpg')] bg-cover bg-center opacity-35 blur-sm scale-110" />
                                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/65" />

                                        <div className="absolute top-5 left-5 right-5 flex items-center justify-between text-white">
                                            <div className="bg-black/30 backdrop-blur-md px-3 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest">
                                                {selectedCategory?.name || 'Prodotto'}
                                            </div>
                                            <div className="bg-black/30 backdrop-blur-md px-3 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest">
                                                1x zoom
                                            </div>
                                        </div>

                                        <div className="absolute bottom-6 left-6 right-6">
                                            <p className="text-2xl font-black text-white leading-none uppercase tracking-tighter mb-2">Inquadra e scopri come salvare il tuo cibo.</p>
                                            <p className="text-[11px] text-white/80 font-medium max-w-[24ch]">Mostra il prodotto che stai per buttare e ricevi subito idee per recuperarlo.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-6 bg-white rounded-[2.5rem] p-6 border border-gray-100 shadow-xl">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="bg-[#F9F4EF] w-16 h-16 rounded-[1.6rem] flex items-center justify-center text-3xl border border-gray-100 shadow-inner">{selectedCategory?.icon}</div>
                                        <div>
                                            <img src={LOGO_URL} alt="Logo" className="h-5 w-auto mb-1" />
                                            <h2 className="text-lg font-black text-[#E30613] leading-none uppercase tracking-tighter">{selectedCategory?.name}</h2>
                                            <p className="text-[10px] text-[#004C97] font-black uppercase tracking-[0.2em] italic">Salva Budget</p>
                                        </div>
                                    </div>

                                    <div className="p-5 bg-[#F9F4EF] rounded-[2rem] text-center mb-5">
                                        <label className="block text-[10px] font-black text-gray-400 uppercase mb-5 tracking-widest">Quanto vuoi ordinare?</label>
                                        <div className="flex items-center justify-between px-2">
                                            <button onClick={() => setBookingQuantity(q => Math.max(50, q-50))} className="bg-white w-14 h-14 flex items-center justify-center rounded-2xl text-[#E30613] shadow-sm active:scale-95"><Icon name="minus" /></button>
                                            <span className="text-5xl font-black text-[#333333] tracking-tighter">{bookingQuantity}g</span>
                                            <button onClick={() => setBookingQuantity(q => q+50)} className="bg-white w-14 h-14 flex items-center justify-center rounded-2xl text-[#006D41] shadow-sm active:scale-95"><Icon name="plus" /></button>
                                        </div>
                                    </div>

                                    <button onClick={handleConfirmOrder} className="w-full bg-[#E30613] text-white font-black py-5 rounded-[2rem] shadow-2xl uppercase tracking-widest text-xs active:opacity-90">Conferma Smart Booking</button>
                                </div>
                            </div>
                        ) : selectedRecipe ? (
                            <div className="p-6 animate-in">
                                <button onClick={() => { setRecipeProofMode(false); setProofPhotoName(''); setSelectedRecipe(null); }} className="mb-6 flex items-center text-[#004C97] font-black text-xs uppercase tracking-widest">
                                    <Icon name="chevron-left" size={16} className="mr-1" /> Indietro
                                </button>

                                {!recipeProofMode ? (
                                    <div className="bg-white rounded-[2.8rem] border border-gray-100 shadow-lg overflow-hidden">
                                        <div className="h-52 bg-[#F9F4EF] relative overflow-hidden">
                                            <img src={selectedRecipe.imageUrl} alt={selectedRecipe.title} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
                                            <div className="absolute top-4 left-4 bg-[#E30613] text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg">Ricetta anti-spreco</div>
                                        </div>
                                        <div className="p-6">
                                            <h2 className="text-2xl font-black text-[#333333] uppercase tracking-tighter italic leading-none mb-3">{selectedRecipe.title}</h2>
                                            <p className="text-[11px] text-gray-500 italic mb-4">Tempo {selectedRecipe.time} • Difficoltà {selectedRecipe.difficulty} • Risparmio {selectedRecipe.saveValue}</p>
                                            <p className="text-sm text-[#333333] mb-4">Usa ingredienti già presenti in frigo e trasforma gli avanzi in un piatto completo.</p>

                                            <div className="bg-[#F9F4EF] rounded-2xl p-4 mb-6 border border-orange-100">
                                                <p className="text-[10px] font-black uppercase text-[#004C97] tracking-widest mb-3">Ingredienti</p>
                                                <ul className="space-y-2">
                                                    {selectedRecipe.ingredients.map((item, idx) => (
                                                        <li key={idx} className="text-sm text-[#333333] flex items-center gap-2">
                                                            <span className="w-1.5 h-1.5 rounded-full bg-[#E30613]"></span>
                                                            <span>{item}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>

                                            <button onClick={() => setRecipeProofMode(true)} className="w-full bg-[#006D41] text-white font-black py-4 rounded-2xl text-[11px] uppercase tracking-widest shadow-lg active:scale-95">Completa ricetta</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-[2.8rem] border border-gray-100 shadow-lg p-6">
                                        <h2 className="text-2xl font-black text-[#004C97] uppercase tracking-tighter italic mb-2">Certifica la ricetta</h2>
                                        <p className="text-sm text-gray-600 mb-6">Allega una foto del piatto finito. Dopo la verifica, il risparmio viene aggiunto in In Tasca.</p>

                                        <label className="block w-full bg-[#F9F4EF] border-2 border-dashed border-[#004C97]/30 rounded-2xl p-6 text-center cursor-pointer">
                                            <p className="text-[10px] font-black uppercase tracking-widest text-[#004C97] mb-2">Allega foto</p>
                                            <p className="text-sm text-gray-600">{proofPhotoName || 'Seleziona immagine dal telefono'}</p>
                                            <input
                                                type="file"
                                                accept="image/*"
                                                className="hidden"
                                                onChange={(e) => {
                                                    const file = e.target.files && e.target.files[0];
                                                    setProofPhotoName(file ? file.name : '');
                                                }}
                                            />
                                        </label>

                                        <div className="mt-5 bg-[#F9F4EF] rounded-2xl p-4 text-center border border-orange-100">
                                            <p className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1">Accredito previsto</p>
                                            <p className="text-3xl font-black text-[#006D41] italic tracking-tighter">+{selectedRecipe.saveValue}</p>
                                        </div>

                                        <button onClick={handleRecipeCertification} disabled={!proofPhotoName} className={`mt-6 w-full font-black py-4 rounded-2xl text-[11px] uppercase tracking-widest shadow-lg ${proofPhotoName ? 'bg-[#E30613] text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                            Conferma e aggiungi in tasca
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === 'map' ? (
                            <div className="p-8 animate-in h-full flex flex-col">
                                <h2 className="text-3xl font-black text-[#004C97] mb-1 uppercase tracking-tighter italic leading-none">Spreca-Zero Map</h2>
                                <p className="text-[10px] text-gray-400 font-bold uppercase mb-8 tracking-widest italic">Verona Centro & Veronetta</p>
                                <div className="h-64 bg-[#F9F4EF] rounded-[3rem] border-4 border-white shadow-inner relative overflow-hidden mt-6 mb-6">
                                    <div className="absolute inset-0 opacity-25 bg-[radial-gradient(circle_at_30%_20%,#fff_0,transparent_35%),radial-gradient(circle_at_70%_60%,#fff_0,transparent_35%)]"></div>
                                    <div className="absolute inset-0 bg-[linear-gradient(45deg,rgba(0,76,151,0.08)_25%,transparent_25%,transparent_50%,rgba(0,76,151,0.08)_50%,rgba(0,76,151,0.08)_75%,transparent_75%,transparent)] bg-[length:32px_32px]"></div>
                                    {mapLocations.map((loc, idx) => (
                                        <div key={loc.id} className={`absolute ${loc.pos} -translate-x-1/2 -translate-y-1/2`}>
                                            <div className={`${loc.color} w-8 h-8 rounded-full border-2 border-white shadow-xl flex items-center justify-center text-white text-[10px] font-black ${idx === 0 ? 'animate-bounce' : ''}`}>📍</div>
                                        </div>
                                    ))}
                                    <p className="absolute bottom-4 left-4 text-gray-400 font-black text-[9px] uppercase tracking-[0.35em]">Verona</p>
                                </div>

                                <div className="space-y-3 overflow-y-auto no-scrollbar">
                                    {mapLocations.map((loc) => (
                                        <div key={loc.id} className="bg-white border border-gray-100 rounded-2xl p-4 flex items-start gap-3 shadow-sm">
                                            <div className={`${loc.color} w-3 h-3 rounded-full mt-1.5`}></div>
                                            <div>
                                                <p className="text-sm font-black text-[#333333] uppercase tracking-tighter">{loc.name}</p>
                                                <p className="text-[10px] text-gray-500 uppercase tracking-widest font-bold">{loc.area}</p>
                                                <p className="text-[10px] text-[#006D41] font-black italic mt-1">{loc.status}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : activeTab === 'shop' ? (
                            <div className="p-8 animate-in h-full bg-white">
                                <h2 className="text-3xl font-black text-[#004C97] mb-8 uppercase tracking-tighter italic leading-tight">Premi</h2>
                                

                                <div className="p-6 bg-white border border-gray-100 rounded-3xl shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-4">Premi disponibili</h4>
                                    <div className="space-y-3">
                                        {[
                                            { title: 'Pass ATV giornaliero', subtitle: 'Mobilità urbana', cost: 800, enabled: points >= 800 },
                                            { title: 'Museo Castelvecchio', subtitle: 'Ingresso ridotto', cost: 1000, enabled: points >= 1000 },
                                            { title: 'Ridotto Arena', subtitle: 'Evento serale', cost: 1800, enabled: points >= 1800 }
                                        ].map((reward, index) => (
                                            <div key={index} className="rounded-2xl border border-gray-100 p-4 flex items-center justify-between gap-4">
                                                <div>
                                                    <p className="text-sm font-black text-[#333333]">{reward.title}</p>
                                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">{reward.subtitle}</p>
                                                </div>
                                                <button className={`px-4 py-2 rounded-full text-[10px] font-black ${reward.enabled ? 'bg-[#004C97] text-white' : 'bg-gray-200 text-gray-400'}`} disabled={!reward.enabled}>
                                                    {reward.cost}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : activeTab === 'profile' ? (
                            <div className="p-8 animate-in h-full bg-white">
                                <h2 className="text-3xl font-black text-[#004C97] mb-8 uppercase tracking-tighter italic leading-tight">In Tasca</h2>
                                <div className="bg-[#F9F4EF] rounded-[3rem] p-10 mb-8 border-4 border-white shadow-xl text-center relative overflow-hidden">
                                    <Icon name="coins" className="mx-auto mb-4 text-[#E30613]" size={48} />
                                    <p className="text-xs font-black text-gray-400 uppercase mb-2 tracking-widest italic">Budget Salvato</p>
                                    <h3 className="text-5xl font-black text-[#006D41] italic tracking-tighter">{savedEuro.toFixed(2)}€</h3>
                                </div>
                                <div className="p-6 bg-white border border-gray-100 rounded-3xl">
                                    <h4 className="text-[10px] font-black uppercase text-gray-400 tracking-widest mb-4">Prossimo Traguardo</h4>
                                    <div className="flex items-center gap-4">
                                        <Icon name="ticket" className="text-[#004C97]" />
                                        <div className="flex-1">
                                            <p className="text-sm font-black text-[#333333]">Sconto Arena di Verona</p>
                                            <div className="w-full bg-gray-100 h-1.5 rounded-full mt-2 overflow-hidden">
                                                <div className="bg-[#FFD700] h-full" style={{ width: '65%' }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in">
                                {/* Hero Card */}
                                <div className="p-6">
                                    <div className="bg-[#004C97] rounded-[3rem] p-8 text-white relative overflow-hidden shadow-2xl">
                                        <h2 className="text-4xl font-black mb-1 leading-none tracking-tighter italic uppercase">Verona In Tasca.</h2>
                                        <p className="text-[10px] font-bold text-blue-100 mb-6 uppercase tracking-[0.2em]">#MenoSprechiPiùBudget</p>
                                        <div className="bg-white/10 backdrop-blur-xl rounded-3xl p-5 border border-white/20">
                                            <p className="text-xs font-medium leading-relaxed mb-4 italic">
                                                "Hai salvato <span className="text-[#FFD700] font-black underline italic">42.50€</span> questo mese grazie alla tua strategia."
                                            </p>
                                            <div className="flex items-center gap-3">
                                                <div className="flex-1 h-2 bg-white/20 rounded-full overflow-hidden">
                                                    <div className="bg-[#FFD700] h-full w-[65%]" />
                                                </div>
                                                <span className="text-[10px] font-black text-[#FFD700]">65%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Voice of Food Insight */}
                                <div className="px-6 mb-8">
                                    <div className="bg-[#F9F4EF] rounded-[2.5rem] p-6 border-2 border-dashed border-[#E30613]/20 flex items-center gap-4">
                                        <div className="text-3xl">🍕</div>
                                        <p className="text-[11px] font-bold text-[#333333] leading-tight italic">
                                            "#AncoraUnMorsoVerona / #NonSprecareVerona / #IlGustoCheResta"
                                        </p>
                                    </div>
                                </div>

                                <div className="px-6 mb-8">
                                    <div className="bg-white rounded-[2rem] p-5 border border-gray-100 shadow-sm">
                                        <p className="text-[10px] font-black uppercase tracking-widest text-[#004C97] mb-2">Come funziona il risparmio ricette</p>
                                        <p className="text-sm text-gray-600 leading-snug">Apri la ricetta, premi Completa ricetta e allega una foto del piatto: da li viene calcolato il risparmio che trovi subito in In Tasca. Salva cibo per vinvere premi</p>
                                    </div>
                                </div>

                                {/* Grid Categorie */}
                                <div className="px-6 grid grid-cols-2 gap-4 mb-10">
                                    {categories.map(cat => (
                                        <button key={cat.id} onClick={() => { setSelectedCategory(cat); setOrderMode(true); }} className="bg-white p-6 rounded-[2.5rem] border border-gray-100 text-left shadow-sm hover:border-[#004C97] transition-all group active:scale-95">
                                            <div className="text-4xl mb-3 group-hover:scale-110 transition-transform">{cat.icon}</div>
                                            <h4 className="font-black text-sm text-[#333333] leading-tight mb-1 uppercase tracking-tighter">{cat.name}</h4>
                                            <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest leading-none italic">{cat.desc}</p>
                                        </button>
                                    ))}
                                </div>
                                
                                {/* Featured Content */}
                                <div className="px-6 pb-24">
                                    <h3 className="text-2xl font-black text-[#333333] mb-6 tracking-tighter uppercase italic px-2">Il Gusto che Resta</h3>
                                    <div className="bg-white rounded-[2.5rem] border border-gray-100 shadow-md overflow-hidden" onClick={() => { setSelectedRecipe(recipesData[0]); setRecipeProofMode(false); setProofPhotoName(''); }}>
                                        <div className="h-44 bg-[#F9F4EF] flex items-center justify-center text-7xl italic relative overflow-hidden">
                                            <img src={recipesData[0].imageUrl} alt={recipesData[0].title} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
                                            <div className="absolute top-4 left-4 bg-[#E30613] text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg">#menosprechipiùbudget</div>
                                        </div>
                                        <div className="p-6">
                                            <h4 className="text-xl font-black text-[#333333] leading-none mb-2 uppercase tracking-tighter italic">Questa è polenta.</h4>
                                            <p className="text-[11px] text-gray-500 italic mb-4 leading-tight">Trasformala nel tuo pranzo di domani e salva altri 3.50€.</p>
                                            <button type="button" onClick={() => { setSelectedRecipe(recipesData[0]); setRecipeProofMode(false); setProofPhotoName(''); }} className="bg-[#006D41] text-white font-black py-3 px-8 rounded-2xl text-[9px] uppercase tracking-widest shadow-lg active:scale-95">Completa ricetta</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="px-6 pb-24">
                                    <h3 className="text-2xl font-black text-[#333333] mb-6 tracking-tighter uppercase italic px-2">Altre ricette anti-spreco</h3>
                                    <div className="grid grid-cols-1 gap-4">
                                        {recipesData.slice(1).map((recipe) => (
                                            <div key={recipe.id} className="bg-white rounded-[2rem] overflow-hidden border border-gray-100 shadow-sm" onClick={() => { setSelectedRecipe(recipe); setRecipeProofMode(false); setProofPhotoName(''); }}>
                                                <div className="h-36 bg-[#F9F4EF] overflow-hidden relative">
                                                    <img src={recipe.imageUrl} alt={recipe.title} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
                                                    <div className="absolute top-3 left-3 bg-[#004C97] text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg">Recupero</div>
                                                </div>
                                                <div className="p-4">
                                                    <h4 className="text-base font-black text-[#333333] leading-none mb-2 uppercase tracking-tighter italic">{recipe.title}</h4>
                                                    <p className="text-[11px] text-gray-500 italic">Pronta in {recipe.time} • {recipe.saveValue} risparmiati</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Navigazione Inferiore */}
                    <div className="bg-white/95 backdrop-blur-2xl border-t border-gray-50 p-6 pb-10 flex justify-around items-center rounded-t-[3.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                        <button onClick={() => navigateTo('home')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'home' ? 'text-[#E30613] scale-110' : 'text-gray-300'}`}>
                            <Icon name="shopping-basket" />
                            <span className="text-[8px] font-black uppercase tracking-widest mt-1 italic">Market</span>
                        </button>
                        <button onClick={() => navigateTo('map')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'map' ? 'text-[#004C97] scale-110' : 'text-gray-300'}`}>
                            <Icon name="map" />
                            <span className="text-[8px] font-black uppercase tracking-widest mt-1 italic">Mappa</span>
                        </button>
                        {/* Quick Order Button */}
                        <button type="button" aria-label="Apri fotocamera" onClick={() => {setSelectedCategory(categories[0]); setOrderMode(true);}} className="w-16 h-16 bg-gradient-to-tr from-[#004C97] to-[#E30613] rounded-[1.5rem] flex items-center justify-center shadow-2xl -mt-10 border-4 border-white active:scale-90 transition-transform cursor-pointer relative overflow-hidden z-10">
                            <Icon name="camera" className="text-white" />
                            <div className="absolute top-0 right-0 w-3 h-3 bg-[#FFD700] rounded-full border-2 border-[#004C97] m-2 animate-pulse"></div>
                        </button>
                        <button onClick={() => navigateTo('shop')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'shop' ? 'text-[#004C97] scale-110' : 'text-gray-300'}`}>
                            <Icon name="ticket" />
                            <span className="text-[8px] font-black uppercase tracking-widest mt-1 italic">Premi</span>
                        </button>
                        <button onClick={() => navigateTo('profile')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'profile' ? 'text-[#004C97] scale-110' : 'text-gray-300'}`}>
                            <Icon name="user" />
                            <span className="text-[8px] font-black uppercase tracking-widest mt-1 italic">In Tasca</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
